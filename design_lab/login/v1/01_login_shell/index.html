<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>01 Login Shell</title>
    <link rel="stylesheet" href="../shared.css" />
  </head>
  <body class="login-lab">
    <main class="login-shell-page">
      <section class="login-shell" aria-label="Login shell study">
        <div class="login-shell__panel login-brand-panel">
          <div class="login-brand-panel__guides" aria-hidden="true"></div>

          <header class="login-brand-panel__header">
            <div class="login-wordmark" aria-label="Stitchly brand">
              <span class="login-wordmark__brand">Stitchly</span>
              <span class="login-wordmark__label">Workflow Studio</span>
            </div>
          </header>

          <div class="login-brand-panel__stage">
            <div class="login-brand-monument" aria-hidden="true">
              <img
                class="login-brand-monument__symbol"
                src="../../../../apps/web/public/brand/symbol/stitchly-symbol-white.svg"
                alt=""
              />
            </div>
          </div>

          <footer class="login-brand-panel__footer">
            <span>Build and orchestrate AI workflows with clarity.</span>
            <span>Desktop shell study</span>
          </footer>
        </div>

        <div class="login-shell__panel login-form-panel">
          <div class="login-form-card">
            <div class="login-form-card__topbar">
              <a class="login-form-card__toplink" href="/">Create an account</a>
            </div>

            <div class="login-form-card__content">
              <h1 class="login-form-card__title">Log in</h1>

              <div class="login-form-shell" aria-hidden="true">
                <div class="login-form-shell__row">
                  <div class="login-shell-field">
                    <span class="login-shell-field__label">Email</span>
                    <div class="login-shell-field__line"></div>
                  </div>

                  <div class="login-shell-field login-shell-field--short">
                    <span class="login-shell-field__label">Password</span>
                    <div class="login-shell-field__line"></div>
                  </div>
                </div>

                <div class="login-form-shell__actions">
                  <span class="login-form-shell__action">
                    <span class="login-form-shell__toggle"></span>
                    <span>Remember me</span>
                  </span>
                  <span class="login-form-shell__action login-form-shell__action--end">
                    Forgot?
                  </span>
                </div>
              </div>

              <div class="login-form-card__spacer" aria-hidden="true"></div>

              <button class="login-form-card__cta" type="button">Sign in</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div class="login-lab-note">
      `01_login_shell` focuses on composition only. Field design and production interactions come next.
    </div>
  </body>
</html>
