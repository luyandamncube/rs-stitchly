<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Lab · HTTP API Request</title>
    <link rel="stylesheet" href="../shared.css" />
  </head>
  <body>
    <main class="lab-page">
      <section class="lab-stage" aria-label="HTTP API Request node sample">
        <article class="node-card node-card--request" aria-label="HTTP API Request node" data-node-kind="request">
          <span class="node-card__handle node-card__handle--left" aria-hidden="true"></span>

          <header class="node-card__header">
            <div class="node-card__heading">
              <span class="node-card__icon" aria-hidden="true">&lt;/&gt;</span>
              <strong>HTTP API Request</strong>
            </div>

            <span class="node-card__menu" aria-hidden="true">...</span>
          </header>

          <section class="node-card__body">
            <div class="node-card__row node-card__row--primary">
              <span class="node-card__label">Method and endpoint</span>
              <strong class="node-card__value">GET /v1/orders?since=...</strong>
            </div>
          </section>

          <footer class="node-card__footer">
            <span class="node-card__footer-meta">
              <span class="node-card__footer-icon" aria-hidden="true">o</span>
              <span>Duration</span>
            </span>
            <strong>0.2s</strong>
          </footer>

          <span class="node-card__handle node-card__handle--right" aria-hidden="true"></span>
        </article>
      </section>
    </main>
  </body>
</html>
