<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Lab • Schedule Trigger Node</title>
    <link rel="stylesheet" href="../shared.css" />
  </head>
  <body>
    <main class="lab-page">
      <section class="lab-stage" aria-label="Schedule trigger node study">
        <article
          class="node-card node-card--trigger"
          aria-label="Schedule trigger node"
          data-node-kind="trigger"
        >
          <span class="node-card__top-chip">Start</span>
          <span
            class="node-card__handle node-card__handle--right"
            aria-hidden="true"
          ></span>

          <header class="node-card__header">
            <div class="node-card__heading">
              <span class="node-card__icon" aria-hidden="true">✳</span>
              <span>Schedule trigger</span>
            </div>
            <span class="node-card__menu" aria-hidden="true">...</span>
          </header>

          <div class="node-card__body">
            <div class="node-card__row node-card__row--kv">
              <span class="node-card__label">
                <span class="node-card__label-icon" aria-hidden="true">o</span>
                <span>Cadence</span>
              </span>
              <span class="node-card__value">Every 5 min</span>
            </div>

            <section class="node-card__panel" aria-label="Last run">
              <div class="node-card__panel-title">Last run</div>
              <div class="node-card__stats">
                <div class="node-card__stat">
                  <span class="node-card__stat-label">Last</span>
                  <span class="node-card__stat-value">Jul 8, 2025 • 14:10</span>
                </div>
                <div class="node-card__stat">
                  <span class="node-card__stat-label">Next</span>
                  <span class="node-card__stat-value">Jul 8, 2025 • 14:05</span>
                </div>
              </div>
            </section>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
