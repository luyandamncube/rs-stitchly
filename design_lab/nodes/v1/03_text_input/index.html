<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Lab · Text Input</title>
    <link rel="stylesheet" href="../shared.css" />
  </head>
  <body>
    <main class="lab-page">
      <section class="lab-stage" aria-label="Text input node study">
        <article
          class="node-card node-card--input-literal node-card--text-input"
          aria-label="Text input node"
          data-node-kind="input-literal"
        >
          <header class="node-card__header">
            <div class="node-card__heading">
              <span class="node-card__icon" aria-hidden="true">T</span>
              <strong>Text input</strong>
            </div>

            <span class="node-card__menu" aria-hidden="true">...</span>
          </header>

          <section class="node-card__body">
            <div class="node-card__row node-card__row--primary">
              <span class="node-card__value node-card__value--multiline">
                Summarize failed refund requests from the last sync
              </span>
            </div>
          </section>

          <footer class="node-card__footer">
            <span class="node-card__footer-meta">Text</span>
            <strong>51 chars</strong>
          </footer>

          <span
            class="node-card__handle node-card__handle--right"
            aria-hidden="true"
          ></span>
        </article>
      </section>
    </main>
  </body>
</html>
