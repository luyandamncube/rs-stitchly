<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Lab · JSON Input</title>
    <link rel="stylesheet" href="../shared.css" />
  </head>
  <body>
    <main class="lab-page">
      <section class="lab-stage" aria-label="JSON input node study">
        <article
          class="node-card node-card--input-structured"
          aria-label="JSON input node"
          data-node-kind="input-structured"
        >
          <header class="node-card__header">
            <div class="node-card__heading">
              <span class="node-card__icon" aria-hidden="true">{ }</span>
              <strong>JSON input</strong>
            </div>

            <span class="node-card__menu" aria-hidden="true">...</span>
          </header>

          <section class="node-card__body">
            <div class="node-card__row node-card__row--primary">
              <span class="node-card__label">JSON</span>
              <strong class="node-card__value node-card__value--truncate node-card__value--code">
                {"batch":"support_weekend","limit":250,"include_refunds":true}
              </strong>
            </div>
          </section>

          <footer class="node-card__footer">
            <span class="node-card__footer-meta">
              <span class="node-card__footer-icon" aria-hidden="true">{ }</span>
              <span>Fields</span>
            </span>
            <strong>3 keys</strong>
          </footer>

          <span
            class="node-card__handle node-card__handle--right"
            aria-hidden="true"
          ></span>
        </article>
      </section>
    </main>
  </body>
</html>
