<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Lab · File Input</title>
    <link rel="stylesheet" href="../shared.css" />
  </head>
  <body>
    <main class="lab-page">
      <section class="lab-stage" aria-label="File input node study">
        <article
          class="node-card node-card--input-reference"
          aria-label="File input node"
          data-node-kind="input-reference"
        >
          <header class="node-card__header">
            <div class="node-card__heading">
              <span class="node-card__icon" aria-hidden="true">F</span>
              <strong>File input</strong>
            </div>

            <span class="node-card__menu" aria-hidden="true">...</span>
          </header>

          <section class="node-card__body">
            <div class="node-card__row node-card__row--primary">
              <span class="node-card__label">File</span>
              <strong class="node-card__value node-card__value--truncate">
                support_refunds_2026_05_17.csv
              </strong>
            </div>
          </section>

          <footer class="node-card__footer">
            <span class="node-card__footer-meta">
              <span class="node-card__footer-icon" aria-hidden="true">#</span>
              <span>Size</span>
            </span>
            <strong>24.6 MB</strong>
          </footer>

          <span
            class="node-card__handle node-card__handle--right"
            aria-hidden="true"
          ></span>
        </article>
      </section>
    </main>
  </body>
</html>
