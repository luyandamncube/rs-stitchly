<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Lab · Preview Output</title>
    <link rel="stylesheet" href="../shared.css" />
  </head>
  <body>
    <main class="lab-page">
      <section class="lab-stage" aria-label="Preview output node study">
        <article
          class="node-card node-card--output-result"
          aria-label="Preview output node"
          data-node-kind="output-result"
        >
          <span class="node-card__top-chip">Output</span>
          <span
            class="node-card__handle node-card__handle--left"
            aria-hidden="true"
          ></span>

          <header class="node-card__header">
            <div class="node-card__heading">
              <span class="node-card__icon" aria-hidden="true">O</span>
              <strong>Preview output</strong>
            </div>

            <span class="node-card__menu" aria-hidden="true">...</span>
          </header>

          <section class="node-card__body">
            <div class="node-card__row node-card__row--kv">
              <span class="node-card__label">
                <span class="node-card__label-icon" aria-hidden="true">T</span>
                <span>Title</span>
              </span>
              <span class="node-card__value">Result</span>
            </div>

            <div class="node-card__row node-card__row--primary">
              <span class="node-card__label">Preview</span>
              <strong class="node-card__value node-card__value--multiline">
                FAILED REFUNDS REQUIRE REVIEW
              </strong>
            </div>
          </section>

          <footer class="node-card__footer">
            <span class="node-card__footer-meta">
              <span class="node-card__footer-icon" aria-hidden="true">S</span>
              <span>Last emit</span>
            </span>
            <strong>Idle</strong>
          </footer>
        </article>
      </section>
    </main>
  </body>
</html>
