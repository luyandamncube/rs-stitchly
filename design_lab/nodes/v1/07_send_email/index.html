<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Lab · Send Email</title>
    <link rel="stylesheet" href="../shared.css" />
  </head>
  <body>
    <main class="lab-page">
      <section class="lab-stage" aria-label="Send email node study">
        <article
          class="node-card node-card--output-result node-card--send-email"
          aria-label="Send email node"
          data-node-kind="output-result"
        >
          <span
            class="node-card__handle node-card__handle--left"
            aria-hidden="true"
          ></span>

          <header class="node-card__header">
            <div class="node-card__heading">
              <span class="node-card__icon" aria-hidden="true">@</span>
              <strong>Send email</strong>
            </div>

            <span class="node-card__menu" aria-hidden="true">...</span>
          </header>

          <section class="node-card__body">
            <div class="node-card__row node-card__row--summary">
              <div class="node-card__summary-head">
                <span class="node-card__label">To</span>
                <span class="node-card__summary-target">ops@stitchly.dev</span>
              </div>

              <div class="node-card__summary-head">
                <span class="node-card__summary-label">Subject</span>
                <strong class="node-card__summary-target node-card__summary-target--subject">
                Failed refunds need review from the latest sync
                </strong>
              </div>
            </div>
          </section>

          <footer class="node-card__footer">
            <span class="node-card__footer-meta">Last send</span>
            <strong>Idle</strong>
          </footer>
        </article>
      </section>
    </main>
  </body>
</html>
